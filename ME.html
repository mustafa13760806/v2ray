<!DOCTYPE html>
<html>
<head>
  <title>Data Fetch and Form Update</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <h1>Form Data Update</h1>

  <form id="dataForm">
    <label for="dataInput">Data:</label>
    <input type="text" id="dataInput" name="dataInput">
    <br><br>
    <input type="submit" value="Submit">
  </form>

  <script>
    // Function to fetch data from URL and update the form
    function fetchDataAndUpdateForm() {
      // HTTP GET request to URL1
      $.get("https://raw.githubusercontent.com/mustafa13760806/v2ray/main/Matin", function(data) {
        // Update the form with the retrieved data
        $("#dataInput").val(data);
      });
    }

    // Initial form update
    fetchDataAndUpdateForm();

    // Schedule form update every hour (in milliseconds)
    setInterval(fetchDataAndUpdateForm, 3600000);

    // Submit form handler (optional)
    $("#dataForm").submit(function(e) {
      e.preventDefault();
      // Get the updated data from the form
      var updatedData = $("#dataInput").val();
      // Do something with the updated data (e.g., send it to a server)

      // Optional: Display a success message
      alert("Data updated successfully!");
    });
  </script>
</body>
</html>
