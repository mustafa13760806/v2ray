<!DOCTYPE html>
<html>
<head>
  <title>Get Text from URL and Save to GitHub</title>
  <script>
    function getTextAndSaveToFile() {
      var url = "https://raw.githubusercontent.com/mustafa13760806/v2ray/main/Matin"; // Replace with your desired URL

      fetch(url)
        .then(response => response.text())
        .then(text => {
          var githubUrl = "https://raw.githubusercontent.com/mustafa13760806/v2ray/main/file1.txt"; // Replace with your GitHub file URL
          var data = new FormData();
          data.append("filename", "file1.txt");
          data.append("content", text);

          fetch(githubUrl, {
            method: "PUT",
            body: data
          })
          .then(response => {
            if (response.ok) {
              console.log("Text saved on GitHub successfully!");
            } else {
              console.error("Failed to save text on GitHub!");
            }
          })
          .catch(error => {
            console.error("Error:", error);
          });
        })
        .catch(error => {
          console.error("Error:", error);
        });
    }
  </script>
</head>
<body>
  <button onclick="getTextAndSaveToFile()">Get Text and Save to File1.txt</button>
</body>
</html>
