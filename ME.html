<!DOCTYPE html>
<html>
<head>
    <title>Text Collection</title>
    <script>
        window.onload = function() {
            // Function to fetch text from url1 and update form1
            function fetchDataAndUpdateForm() {
                var xhr = new XMLHttpRequest();
                var url = "https://raw.githubusercontent.com/mustafa13760806/v2ray/main/Matin"; // Replace with your desired URL

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        if (xhr.status === 200) {
                            document.getElementById("form1").value = xhr.responseText;
                        } else {
                            console.error("Error fetching data from url1. Status:", xhr.status);
                        }
                    }
                };

                xhr.open("GET", url, true);
                xhr.send();
            }

            // Initial fetch and update
            fetchDataAndUpdateForm();

            // Repeat fetch and update every hour
            setInterval(fetchDataAndUpdateForm, 3600000); // 3600000 ms = 1 hour
        };
    </script>
</head>
<body>
    <form>
        <textarea id="form1"></textarea>
    </form>
</body>
</html>
